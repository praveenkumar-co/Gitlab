stages:
  - build
  - test
  - push
  - deploy

build_job:
  stage: build
  script:
    - echo "Building project $CI_PROJECT_NAME"
    - echo "Docker build completed."

test_job:
  stage: test
  script:
    - mkdir -p logs
    - echo "Testing project by $CI_COMMIT_AUTHOR"
    - echo "All test cases passed." > logs/app.log

  artifacts:
    paths:
      - logs/
    expire_in: 1 week

push_job:
  stage: push
  script:
    - echo "Pushing Docker image..."
    - 'echo "DockerHub User: $CICDKEY"'   
    - 'echo "DockerHub Token: $GitlabToken"'

deploy_job:
  stage: deploy
  environment:
    name: production
  script:
    - echo "Deploying application..."
    - echo "Deployment completed."